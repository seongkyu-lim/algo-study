<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 스터디 📚</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/kotlin.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d2a8ff;
            --danger: #f85149;
            --warning: #d29922;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        header {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
            background: var(--surface);
        }
        header h1 { font-size: 1.5rem; font-weight: 700; }
        header h1 span { color: var(--accent); }
        .header-row { display: flex; align-items: center; justify-content: space-between; }
        .stats { display: flex; gap: 24px; }
        .stat { text-align: center; }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

        /* Tabs */
        .tabs {
            display: flex; gap: 0; border-bottom: 1px solid var(--border);
            padding-top: 16px; background: var(--surface);
        }
        .tab {
            padding: 8px 16px; cursor: pointer; color: var(--text-muted);
            border-bottom: 2px solid transparent; font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--text); border-bottom-color: var(--accent); }

        /* Main content */
        main { padding: 24px 0; }

        /* Day cards */
        .day-grid { display: flex; flex-direction: column; gap: 12px; }
        .day-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px 20px;
            cursor: pointer; transition: all 0.2s;
        }
        .day-card:hover { border-color: var(--accent); transform: translateX(4px); }
        .day-card.completed { border-left: 3px solid var(--accent2); }
        .day-header { display: flex; align-items: center; justify-content: space-between; }
        .day-title { font-weight: 600; font-size: 1rem; }
        .day-tag {
            font-size: 0.75rem; padding: 2px 10px; border-radius: 12px;
            background: var(--surface2); color: var(--accent3); font-weight: 500;
        }
        .day-problems {
            display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;
        }
        .problem-chip {
            font-size: 0.8rem; color: var(--text-muted);
            display: flex; align-items: center; gap: 4px;
        }
        .problem-chip .num { color: var(--accent); font-weight: 600; }
        .solution-count {
            font-size: 0.75rem; color: var(--accent2); margin-left: auto;
            display: flex; align-items: center; gap: 4px;
        }

        /* Problem detail view */
        .problem-view { display: none; }
        .problem-view.active { display: block; }
        .back-btn {
            background: none; border: none; color: var(--accent);
            cursor: pointer; font-size: 0.9rem; padding: 8px 0;
            display: flex; align-items: center; gap: 4px;
        }
        .problem-title-bar {
            display: flex; align-items: center; gap: 12px; margin: 16px 0;
        }
        .problem-title-bar h2 { font-size: 1.3rem; }
        .difficulty {
            font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; font-weight: 600;
        }
        .difficulty.Easy { background: #0d331a; color: var(--accent2); }
        .difficulty.Medium { background: #332d0d; color: var(--warning); }
        .difficulty.Hard { background: #330d0d; color: var(--danger); }

        .problem-desc {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
            font-size: 0.9rem; line-height: 1.8;
        }
        .problem-desc code {
            background: var(--surface2); padding: 2px 6px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
        }
        .problem-desc pre {
            background: var(--surface2); padding: 12px; border-radius: 6px;
            overflow-x: auto; margin: 8px 0;
        }

        /* Solutions */
        .solutions-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .solutions-header h3 { font-size: 1.1rem; }
        .solution-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 12px; overflow: hidden;
        }
        .solution-meta {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .solution-author {
            font-weight: 600; color: var(--accent);
        }
        .solution-lang {
            font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
            background: var(--surface2); color: var(--text-muted);
        }
        .complexity {
            font-size: 0.75rem; color: var(--text-muted);
            display: flex; gap: 12px; margin-left: auto;
        }
        .complexity span { display: flex; align-items: center; gap: 4px; }
        .solution-code {
            padding: 0; margin: 0;
        }
        .solution-code pre {
            margin: 0; padding: 16px; border-radius: 0;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
        }
        .solution-notes {
            padding: 12px 16px; border-top: 1px solid var(--border);
            font-size: 0.85rem; color: var(--text-muted);
        }
        .no-solutions {
            text-align: center; padding: 48px; color: var(--text-muted);
        }

        /* Members tab */
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
        .member-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; text-align: center;
        }
        .member-avatar {
            width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 12px;
            background: var(--surface2); display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem;
        }
        .member-name { font-weight: 600; margin-bottom: 4px; }
        .member-count { font-size: 0.85rem; color: var(--text-muted); }

        /* Progress bar */
        .progress-bar {
            height: 4px; background: var(--surface2); border-radius: 2px;
            margin-top: 8px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--accent2); border-radius: 2px;
            transition: width 0.3s;
        }

        /* Loading */
        .loading { text-align: center; padding: 48px; color: var(--text-muted); }
        .spinner {
            display: inline-block; width: 24px; height: 24px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 640px) {
            .stats { gap: 16px; }
            .day-problems { flex-direction: column; gap: 4px; }
            .complexity { margin-left: 0; margin-top: 4px; }
        }
    </style>
</head>

        <div id="problem-detail" class="problem-view">
            <button class="back-btn" onclick="goBack()">← 뒤로</button>

    // ============ DATA ============
    let solutionsData = {};
    let currentView = 'schedule';

    async function loadData() {
        try {
            const resp = await fetch('data/solutions.json');
            if (resp.ok) {
                solutionsData = await resp.json();
            }
        } catch(e) {
            console.log('No solutions data yet');
        }
        document.getElementById('loading').style.display = 'none';
        renderStats();
        showTab('schedule');
    }

    function renderStats() {
        const totalProblems = SCHEDULE.reduce((a, d) => a + d.problems.length, 0);
        const allSolutions = Object.values(solutionsData);
        const totalSolutions = allSolutions.reduce((a, s) => a + s.solutions.length, 0);
        const members = new Set();
        allSolutions.forEach(s => s.solutions.forEach(sol => members.add(sol.author)));

        document.getElementById('total-problems').textContent = totalProblems;
        document.getElementById('total-solutions').textContent = totalSolutions;
        document.getElementById('total-members').textContent = members.size;
    }

    // ============ TABS ============
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => showTab(tab.dataset.tab));
    });

    function showTab(name) {
        currentView = name;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById('problem-detail').classList.remove('active');

        if (name === 'schedule') {
            document.getElementById('schedule-view').style.display = 'block';
            renderSchedule();
        } else if (name === 'all-problems') {
            document.getElementById('all-problems-view').style.display = 'block';
            renderAllProblems();
        } else if (name === 'members') {
            document.getElementById('members-view').style.display = 'block';
            renderMembers();
        }
    }

    // ============ SCHEDULE VIEW ============
    function renderSchedule() {
        const grid = document.getElementById('day-grid');
        grid.innerHTML = SCHEDULE.map(day => {
            const solCounts = day.problems.map(p => {
                const key = findSolutionKey(p);
                return key && solutionsData[key] ? solutionsData[key].solutions.length : 0;
            });
            const totalSol = solCounts.reduce((a,b) => a+b, 0);
            const hasAny = totalSol > 0;

            return `
            <div class="day-card ${hasAny ? 'completed' : ''}" onclick="showDay(${day.day})">
                <div class="day-header">
                    <div class="day-title">Day ${day.day}</div>
                    <div class="day-tag">${day.type}</div>
                    ${totalSol > 0 ? `<div class="solution-count">✅ ${totalSol} 풀이</div>` : ''}
                </div>
                <div class="day-problems">
                    ${day.problems.map((p, i) => `
                        <div class="problem-chip">
                            <span class="num">#${p.id}</span> ${p.name}
                            ${solCounts[i] > 0 ? `<span style="color:var(--accent2)">(${solCounts[i]})</span>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function showDay(dayNum) {
        const day = SCHEDULE.find(d => d.day === dayNum);
        if (!day) return;

        const detail = document.getElementById('problem-detail');
        const content = document.getElementById('problem-content');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        detail.classList.add('active');

        content.innerHTML = `
            <h2 style="margin:16px 0">Day ${day.day} — ${day.type}</h2>
            ${day.problems.map(p => renderProblemSection(p)).join('')}
        `;
        hljs.highlightAll();
    }

    // ============ ALL PROBLEMS VIEW ============
    function renderAllProblems() {
        const grid = document.getElementById('all-problems-grid');
        const allProblems = [];
        SCHEDULE.forEach(day => {
            day.problems.forEach(p => {
                allProblems.push({ ...p, day: day.day, type: day.type });
            });
        });

        grid.innerHTML = allProblems.map(p => {
            const key = findSolutionKey(p);
            const sol = key && solutionsData[key] ? solutionsData[key] : null;
            const count = sol ? sol.solutions.length : 0;
            return `
            <div class="day-card ${count > 0 ? 'completed' : ''}" onclick="showProblem('${p.slug}')">
                <div class="day-header">
                    <div class="day-title">
                        <span class="difficulty ${p.difficulty}" style="font-size:0.7rem;margin-right:8px">${p.difficulty}</span>
                        #${p.id} ${p.name}
                    </div>
                    ${count > 0 ? `<div class="solution-count">✅ ${count}</div>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function showProblem(slug) {
        const prob = findProblemBySlug(slug);
        if (!prob) return;

        const detail = document.getElementById('problem-detail');
        const content = document.getElementById('problem-content');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        detail.classList.add('active');

        content.innerHTML = renderProblemSection(prob);
        hljs.highlightAll();
    }

    // ============ MEMBERS VIEW ============
    function renderMembers() {
        const members = {};
        Object.values(solutionsData).forEach(s => {
            s.solutions.forEach(sol => {
                if (!members[sol.author]) members[sol.author] = { count: 0, langs: new Set() };
                members[sol.author].count++;
                members[sol.author].langs.add(sol.language);
            });
        });

        const grid = document.getElementById('members-grid');
        const entries = Object.entries(members).sort((a,b) => b[1].count - a[1].count);

        if (entries.length === 0) {
            grid.innerHTML = '<div class="no-solutions">아직 풀이가 없습니다</div>';
            return;
        }

        const totalProblems = SCHEDULE.reduce((a, d) => a + d.problems.length, 0);
        grid.innerHTML = entries.map(([name, data]) => {
            const pct = Math.round(data.count / totalProblems * 100);
            return `
            <div class="member-card">
                <div class="member-avatar">${name[0].toUpperCase()}</div>
                <div class="member-name">${name}</div>
                <div class="member-count">${data.count}문제 풀이 · ${[...data.langs].join(', ')}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">${pct}% 완료</div>
            </div>`;
        }).join('');
    }

    // ============ HELPERS ============
    function findSolutionKey(problem) {
        // Match by folder name pattern: NNNN-slug
        const padded = problem.id.padStart(4, '0');
        const keys = Object.keys(solutionsData);
        return keys.find(k => k.startsWith(padded)) || null;
    }

    function findProblemBySlug(slug) {
        for (const day of SCHEDULE) {
            for (const p of day.problems) {
                if (p.slug === slug) return p;
            }
        }
        return null;
    }

    function renderProblemSection(problem) {
        const key = findSolutionKey(problem);
        const data = key && solutionsData[key] ? solutionsData[key] : null;

        return `
        <div style="margin-bottom:32px">
            <div class="problem-title-bar">
                <h2>#${problem.id} ${problem.name}</h2>
                <span class="difficulty ${problem.difficulty}">${problem.difficulty}</span>
                <a href="https://leetcode.com/problems/${problem.slug}/" target="_blank"
                   style="color:var(--accent);font-size:0.85rem;margin-left:auto">LeetCode →</a>
            </div>
            ${data && data.description ? `<div class="problem-desc">${data.description}</div>` : ''}
            <div class="solutions-header">
                <h3>풀이 (${data ? data.solutions.length : 0})</h3>
            </div>
            ${data && data.solutions.length > 0 ? data.solutions.map(sol => `
                <div class="solution-card">
                    <div class="solution-meta">
                        <span class="solution-author">${sol.author}</span>
                        <span class="solution-lang">${sol.language}</span>
                        <div class="complexity">
                            ${sol.timeComplexity ? `<span>⏱ ${sol.timeComplexity}</span>` : ''}
                            ${sol.spaceComplexity ? `<span>💾 ${sol.spaceComplexity}</span>` : ''}
                        </div>
                    </div>
                    <div class="solution-code">
                        <pre><code class="language-${sol.language.toLowerCase()}">${escapeHtml(sol.code)}</code></pre>
                    </div>
                    ${sol.notes ? `<div class="solution-notes">${sol.notes}</div>` : ''}
                </div>
            `).join('') : '<div class="no-solutions">아직 풀이가 없습니다. 레포에 push하면 자동 반영됩니다! 🚀</div>'}
        </div>`;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function goBack() {
        document.getElementById('problem-detail').classList.remove('active');
        showTab(currentView);
    }

    // ============ INIT ============
    loadData();
    </script>
</body>
</html>
